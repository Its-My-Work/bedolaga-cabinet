version: "3.9"

networks:
  remnawave-network:
    external: true

services:
  # Remnawave / Bedolaga бот с API
  remnawave_bot:
    image: bedolaga/remnawave-bot:latest   # подставь свой образ
    container_name: remnawave_bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Web API наружу (чтобы и Telegram Mini App, и кабинет могли ходить)
      - "${WEB_API_PORT:-8080}:8080"
    networks:
      - remnawave-network

  # Frontend кабинета
  cabinet-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # API бота внутри docker-сети
        CABINET_API_URL: "http://remnawave_bot:8080"
        # Браузерский базовый путь до API (снаружи будет /api -> remnawave_bot)
        VITE_API_URL: "/api"
        VITE_TELEGRAM_BOT_USERNAME: "${VITE_TELEGRAM_BOT_USERNAME}"
        VITE_APP_NAME: "${VITE_APP_NAME:-Cabinet}"
        VITE_APP_LOGO: "${VITE_APP_LOGO:-V}"
    container_name: cabinet_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Frontend наружу, чтобы Easypanel вёл домен на этот порт
      - "${CABINET_PORT:-3020}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - remnawave-network
