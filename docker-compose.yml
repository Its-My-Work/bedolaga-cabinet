version: "3.9"

services:
  cabinet-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Куда ходит кабинет внутри docker-сети (Remnawave бот)
        CABINET_API_URL: "http://remnawave_bot:8080"
        # Браузерский базовый путь до API (снаружи будет /api)
        VITE_API_URL: "/api"
        VITE_TELEGRAM_BOT_USERNAME: "${VITE_TELEGRAM_BOT_USERNAME}"
        VITE_APP_NAME: "${VITE_APP_NAME:-Cabinet}"
        VITE_APP_LOGO: "${VITE_APP_LOGO:-V}"
    container_name: cabinet_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${CABINET_PORT:-3020}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - remnawave-network

networks:
  remnawave-network:
    external: true
