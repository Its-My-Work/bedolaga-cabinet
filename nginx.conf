upstream bot_backend {
    # этот блок можно вообще убрать, если он больше не нужен
    # или оставить для других location'ов
    server remnawave_bot:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        # ВАЖНО: через переменную, чтобы не кешировать IP
        set $bot_backend http://remnawave_bot:8080;
        proxy_pass $bot_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
